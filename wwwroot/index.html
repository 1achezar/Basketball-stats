<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Scouting Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-50 px-8 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-basketball text-orange-500 text-3xl animate-pulse"></i>
            <h1 class="text-2xl font-black tracking-wider uppercase text-white bg-gradient-to-r from-orange-500 to-amber-400 bg-clip-text text-transparent">PRO SCOUTING INDEX</h1>
        </div>
        <a href="/swagger" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold px-4 py-2 rounded-lg border border-slate-700 transition duration-200">
            Open API Docs <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-slate-400"></i>
        </a>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 md:grid-cols-4 gap-8">

        <section class="md:col-span-1 bg-slate-900 border border-slate-800 rounded-2xl p-6 h-fit shadow-xl space-y-6 sticky top-24">
            <div class="border-b border-slate-800 pb-3">
                <h2 class="text-lg font-bold text-orange-400 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-sm"></i> Engine Filters
                </h2>
                <p class="text-xs text-slate-400 mt-1">Refine real-time dataset parameters</p>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Search Player Name</label>
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-500 text-sm"></i>
                    <input type="text" id="searchName" oninput="fetchFilteredPlayers()"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-orange-500 transition"
                           placeholder="e.g., LeBron James">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Position / Title</label>
                <select id="searchPosition" onchange="fetchFilteredPlayers()"
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-orange-500 transition">
                    <option value="">All Positions</option>
                    <option value="PG">PG (Point Guard)</option>
                    <option value="SG">SG (Shooting Guard)</option>
                    <option value="SF">SF (Small Forward)</option>
                    <option value="PF">PF (Power Forward)</option>
                    <option value="C">C (Center)</option>
                </select>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Minimum Scoring</label>
                    <span id="scoreValue" class="text-xs font-mono font-bold text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20">0 PPG</span>
                </div>
                <input type="range" id="searchMinScore" min="0" max="40" value="0"
                       oninput="document.getElementById('scoreValue').innerText = this.value + ' PPG'; fetchFilteredPlayers();"
                       class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-orange-500">
            </div>

            <div class="bg-slate-950 rounded-xl p-4 border border-slate-800/60 text-center">
                <span id="playerCount" class="text-3xl font-black text-white font-mono">0</span>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold mt-1">Matching Records Cached</p>
            </div>
        </section>

        <section class="md:col-span-3 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-extrabold text-white tracking-tight">Scouting Roster Profiles</h3>
                <span class="text-xs text-slate-400 font-medium">Database Node: SQLite</span>
            </div>

            <div id="playerGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchFilteredPlayers();
        });

        async function fetchFilteredPlayers() {
            const nameKeyword = document.getElementById("searchName").value.toLowerCase();
            const selectedPosition = document.getElementById("searchPosition").value;
            const minPPG = document.getElementById("searchMinScore").value;

            let url = `/api/players/search?minScore=${minPPG}`;
            if (selectedPosition) {
                url += `&position=${selectedPosition}`;
            }

            try {
                const response = await fetch(url);
                const players = await response.json();

                const filteredPlayers = players.filter(player =>
                    player.name.toLowerCase().includes(nameKeyword)
                );

                document.getElementById("playerCount").innerText = filteredPlayers.length;

                const grid = document.getElementById("playerGrid");
                grid.innerHTML = "";

                if (filteredPlayers.length === 0) {
                    grid.innerHTML = `
                                <div class="col-span-full bg-slate-900 border border-dashed border-slate-800 rounded-2xl p-12 text-center text-slate-500">
                                    <i class="fa-solid fa-users-slash text-4xl mb-3 block text-slate-600"></i>
                                    <p class="text-sm font-semibold">No player profiles match current scouting filters.</p>
                                </div>`;
                    return;
                }

                filteredPlayers.forEach(player => {
                    const playerCard = document.createElement("div");
                    playerCard.className = "bg-slate-900 border border-slate-800/80 rounded-2xl p-5 hover:border-orange-500/40 transition-all duration-300 shadow-md group relative overflow-hidden flex flex-col justify-between";

                    playerCard.innerHTML = `
                                <div>
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="bg-slate-950 text-slate-400 border border-slate-800 text-[10px] font-mono tracking-wider font-extrabold px-2.5 py-1 rounded-md uppercase">
                                            ${player.position || 'N/A'}
                                        </span>
                                        <div class="text-right">
                                            <span class="text-xs text-slate-500 block uppercase tracking-wider text-[9px] font-bold">Scouting Metric</span>
                                            <span class="text-lg font-black font-mono text-orange-400">${player.pointsPerGame} <span class="text-xs font-normal text-slate-400">PPG</span></span>
                                        </div>
                                    </div>

                                    <h4 class="text-base font-bold text-white tracking-tight group-hover:text-orange-400 transition-colors mb-1">
                                        ${player.name}
                                    </h4>
                                    <p class="text-xs text-slate-400 flex items-center gap-1.5">
                                        <i class="fa-solid fa-gavel text-slate-600 text-[10px]"></i> ${player.team ? player.team.name : 'Free Agent'}
                                    </p>
                                </div>

                                <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-orange-500 to-amber-500 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300"></div>
                            `;
                    grid.appendChild(playerCard);
                });

            } catch (error) {
                console.error("Scouting search engine pipeline fault:", error);
            }
        }
    </script>
</body>
</html>
